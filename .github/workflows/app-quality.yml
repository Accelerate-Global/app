name: App Quality

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: app-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  app-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run test
      - run: pnpm run build
