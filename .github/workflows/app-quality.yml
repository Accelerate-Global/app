name: App Quality

on:
  pull_request:

concurrency:
  group: app-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  app-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - id: selection
        run: node --import tsx scripts/ci-select-validation.ts --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"

      - if: steps.selection.outputs.app_quality == 'true'
        run: pnpm run verify:test-delta
        env:
          VERIFY_TEST_DELTA_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          VERIFY_TEST_DELTA_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      - if: steps.selection.outputs.app_quality == 'true'
        run: pnpm run verify:app

      - if: steps.selection.outputs.app_quality != 'true'
        run: echo "No app-quality-relevant files changed."
