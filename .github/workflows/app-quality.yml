name: App Quality

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: app-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  app-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run verify:test-delta
        env:
          VERIFY_TEST_DELTA_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          VERIFY_TEST_DELTA_HEAD_SHA: ${{ github.sha }}
      - run: pnpm run verify:app
