name: Dependency Audit

on:
  pull_request:

concurrency:
  group: dependency-audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - id: preinstall_selection
        run: node scripts/ci-preinstall-select.mjs --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"

      - if: steps.preinstall_selection.outputs.run_dependency_audit != 'true'
        run: echo "No dependency-audit-relevant files changed."

      - if: steps.preinstall_selection.outputs.run_dependency_audit == 'true'
        run: pnpm install --frozen-lockfile

      - if: steps.preinstall_selection.outputs.run_dependency_audit == 'true'
        run: pnpm audit --audit-level=high
