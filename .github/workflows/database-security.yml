name: Database Security

on:
  pull_request:

concurrency:
  group: database-security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  database-security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-pnpm-node

      - id: preinstall_selection
        run: node scripts/ci-preinstall-select.mjs --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"

      - if: steps.preinstall_selection.outputs.run_database_security != 'true'
        run: echo "No database or security-relevant files changed."

      - if: steps.preinstall_selection.outputs.run_database_security == 'true'
        run: pnpm install --frozen-lockfile

      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1
        if: steps.preinstall_selection.outputs.run_database_security == 'true'
        with:
          version: 2.75.0

      - if: steps.preinstall_selection.outputs.run_database_security == 'true'
        run: supabase start

      - if: steps.preinstall_selection.outputs.run_database_security == 'true'
        run: pnpm run db:security:started
