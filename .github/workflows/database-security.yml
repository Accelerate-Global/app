name: Database Security

on:
  pull_request:

concurrency:
  group: database-security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  database-security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - id: selection
        run: node --import tsx scripts/ci-select-validation.ts --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"

      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1
        if: steps.selection.outputs.database_security == 'true'
        with:
          version: 2.75.0

      - if: steps.selection.outputs.database_security == 'true'
        run: supabase start

      - if: steps.selection.outputs.database_security == 'true'
        run: pnpm run db:security:started

      - if: steps.selection.outputs.database_security != 'true'
        run: echo "No database or security-relevant files changed."
