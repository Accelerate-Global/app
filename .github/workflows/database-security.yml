name: Database Security

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: database-security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  database-security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            database:
              - '.github/workflows/database-security.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'scripts/check-public-rls.mjs'
              - 'scripts/run-remote-db-tests.mjs'
              - 'src/db/**'
              - 'src/lib/auth.ts'
              - 'src/lib/dataset-access.ts'
              - 'src/lib/field-definitions.ts'
              - 'src/lib/field-sources.ts'
              - 'src/lib/signup-allowlist.ts'
              - 'src/lib/supabase/**'
              - 'supabase/**'

      - uses: pnpm/action-setup@v4
        if: steps.changes.outputs.database == 'true' || github.event_name == 'push'
        with:
          version: 10

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.database == 'true' || github.event_name == 'push'
        with:
          node-version: 22
          cache: pnpm

      - uses: supabase/setup-cli@v1
        if: steps.changes.outputs.database == 'true' || github.event_name == 'push'
        with:
          version: latest

      - if: steps.changes.outputs.database == 'true' || github.event_name == 'push'
        run: pnpm install --frozen-lockfile

      - if: steps.changes.outputs.database == 'true' || github.event_name == 'push'
        run: pnpm run db:security

      - if: steps.changes.outputs.database != 'true' && github.event_name != 'push'
        run: echo "No database or security-relevant files changed."
