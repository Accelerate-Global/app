name: Database Security

on:
  pull_request:

concurrency:
  group: database-security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  database-security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - id: selection
        run: node --import tsx scripts/ci-select-validation.ts --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"

      - uses: supabase/setup-cli@v1
        if: steps.selection.outputs.database_security == 'true'
        with:
          version: latest

      - if: steps.selection.outputs.database_security == 'true'
        run: supabase start

      - if: steps.selection.outputs.database_security == 'true'
        run: pnpm run db:security:started

      - if: steps.selection.outputs.database_security != 'true'
        run: echo "No database or security-relevant files changed."
