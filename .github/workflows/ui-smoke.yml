name: UI Smoke

on:
  pull_request:

concurrency:
  group: ui-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  ui-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - id: selection
        run: node --import tsx scripts/ci-select-validation.ts --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"

      - uses: supabase/setup-cli@v1
        if: steps.selection.outputs.ui_smoke_browser == 'true'
        with:
          version: latest

      - if: steps.selection.outputs.ui_smoke_browser == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - if: steps.selection.outputs.ui_smoke_mode == 'targeted'
        run: pnpm run test:ui:smoke:targeted -- --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"

      - if: steps.selection.outputs.ui_smoke_mode == 'full'
        run: pnpm run test:ui:smoke

      - if: always() && steps.selection.outputs.ui_smoke_mode != 'none'
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-report
          path: |
            output/playwright/ui-smoke
            test-results/ui-smoke
          if-no-files-found: ignore

      - if: steps.selection.outputs.ui_smoke_mode == 'none'
        run: echo "No UI smoke-relevant files changed."
