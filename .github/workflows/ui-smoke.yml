name: UI Smoke

on:
  pull_request:

concurrency:
  group: ui-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  ui-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-pnpm-node

      - id: preinstall_selection
        run: node scripts/ci-preinstall-select.mjs --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"

      - if: steps.preinstall_selection.outputs.run_ui_smoke != 'true'
        run: echo "No UI smoke-relevant files changed."

      - if: steps.preinstall_selection.outputs.run_ui_smoke == 'true'
        run: pnpm install --frozen-lockfile

      - if: steps.preinstall_selection.outputs.run_ui_smoke == 'true'
        id: selection
        run: node --import tsx scripts/ci-select-validation.ts --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"

      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1
        if: steps.preinstall_selection.outputs.run_ui_smoke == 'true' && steps.selection.outputs.ui_smoke_browser == 'true'
        with:
          version: 2.75.0

      - if: steps.preinstall_selection.outputs.run_ui_smoke == 'true' && steps.selection.outputs.ui_smoke_browser == 'true'
        id: playwright_version
        run: echo "version=$(node -p 'require(\"./package.json\").devDependencies[\"@playwright/test\"].replace(/[^0-9A-Za-z._-]+/g, \"-\")')" >> "$GITHUB_OUTPUT"

      - if: steps.preinstall_selection.outputs.run_ui_smoke == 'true' && steps.selection.outputs.ui_smoke_browser == 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright_version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - if: steps.preinstall_selection.outputs.run_ui_smoke == 'true' && steps.selection.outputs.ui_smoke_browser == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - if: steps.preinstall_selection.outputs.run_ui_smoke == 'true' && steps.selection.outputs.ui_smoke_mode == 'targeted'
        run: pnpm run test:ui:smoke:targeted -- --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"

      - if: steps.preinstall_selection.outputs.run_ui_smoke == 'true' && steps.selection.outputs.ui_smoke_mode == 'full'
        run: pnpm run test:ui:smoke

      - if: always() && steps.preinstall_selection.outputs.run_ui_smoke == 'true' && steps.selection.outputs.ui_smoke_mode != 'none'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ui-smoke-report
          path: |
            output/playwright/ui-smoke
            test-results/ui-smoke
          if-no-files-found: ignore
