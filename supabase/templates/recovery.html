<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset your password</title>
  </head>
  <body style="margin: 0; padding: 32px 16px; background: #f5f0e8; color: #262531;">
    <table
      role="presentation"
      cellpadding="0"
      cellspacing="0"
      width="100%"
      style="max-width: 640px; margin: 0 auto; border-collapse: collapse;"
    >
      <tr>
        <td
          style="
            border: 1px solid rgba(38, 37, 49, 0.12);
            border-radius: 24px;
            background: #fffdfa;
            padding: 40px 32px;
            box-shadow: 0 24px 70px -36px rgba(38, 37, 49, 0.42);
          "
        >
          <p
            style="
              margin: 0 0 12px;
              font-family: Georgia, 'Times New Roman', serif;
              font-size: 16px;
              font-weight: 700;
              letter-spacing: 0.08em;
              text-transform: uppercase;
              color: #6c6a75;
            "
          >
            Accelerate Global Data
          </p>
          <h1
            style="
              margin: 0 0 20px;
              font-family: Georgia, 'Times New Roman', serif;
              font-size: 40px;
              line-height: 1.05;
              color: #262531;
            "
          >
            Reset your password
          </h1>
          <p
            style="
              margin: 0 0 16px;
              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
              font-size: 17px;
              line-height: 1.65;
              color: #4d4a58;
            "
          >
            We received a request to reset the password for {{ .Email }}.
          </p>
          <p
            style="
              margin: 0 0 32px;
              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
              font-size: 17px;
              line-height: 1.65;
              color: #4d4a58;
            "
          >
            Use the button below to choose a new password. If you did not request this,
            you can safely ignore this email.
          </p>
          <a
            href="{{ .ConfirmationURL }}"
            style="
              display: inline-block;
              border-radius: 999px;
              background: #262531;
              padding: 14px 24px;
              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
              font-size: 16px;
              font-weight: 600;
              color: #fffdfa;
              text-decoration: none;
            "
          >
            Reset password
          </a>
          <p
            style="
              margin: 32px 0 0;
              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
              font-size: 14px;
              line-height: 1.6;
              color: #6c6a75;
            "
          >
            This link will open the password reset flow at
            <a href="{{ .SiteURL }}" style="color: #262531;">{{ .SiteURL }}</a>.
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
